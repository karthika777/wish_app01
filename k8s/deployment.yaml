apiVersion: apps/v1
kind: Deployment
metadata:
  name: wish-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: wish-app
  template:
    metadata:
      labels:
        app: wish-app
    spec:
      containers:
      - name: wish-app
        image: <ECR_IMAGE_URL>
        ports:
        - containerPort: 5000